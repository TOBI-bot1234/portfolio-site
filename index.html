<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Kelley</title>
  <meta name="description" content="Owen Kelley — personal site." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="brand">
      <a href="index.html" class="wordmark" aria-label="Owen Kelley, home">OWEN KELLEY</a>
      <p class="intro" aria-live="polite">
        <span class="intro-text" data-intro></span><span class="intro-caret" aria-hidden="true"></span>
        <a class="intro-cta" href="#" data-intro-cta hidden>talk to Tobi</a>
      </p>
    </div>
    <nav class="nav-links" aria-label="Primary">
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="hero">
    <h1 class="hero-text">
      Building thoughtful software,<br />
      one detail at a time.
    </h1>
    <div class="hero-actions" role="group" aria-label="Primary actions">
      <a class="btn" href="work.html">View work</a>
      <a class="btn" href="contact.html">Get in touch</a>
    </div>
  </main>

  <script>
    (function () {
      var textEl = document.querySelector('[data-intro]');
      var caretEl = document.querySelector('.intro-caret');
      var ctaEl = document.querySelector('[data-intro-cta]');
      if (!textEl || !ctaEl) return;

      var messages = [
        'Hey!',
        'Pssss!',
        'My Name is Tobi'
      ];

      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) {
        textEl.textContent = '';
        if (caretEl) caretEl.remove();
        ctaEl.hidden = false;
        return;
      }

      var typeMs = 55;
      var eraseMs = 30;
      var holdMs = 900;
      var finalHoldMs = 1400;

      var msgIdx = 0;
      var charIdx = 0;
      var typing = true;

      function step() {
        var current = messages[msgIdx];
        var isLast = msgIdx === messages.length - 1;
        if (typing) {
          charIdx++;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx >= current.length) {
            if (isLast) {
              setTimeout(function () {
                if (caretEl) caretEl.remove();
                ctaEl.hidden = false;
              }, finalHoldMs);
              return;
            }
            typing = false;
            setTimeout(step, holdMs);
            return;
          }
          setTimeout(step, typeMs);
        } else {
          charIdx--;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx <= 0) {
            typing = true;
            msgIdx++;
            setTimeout(step, typeMs);
            return;
          }
          setTimeout(step, eraseMs);
        }
      }

      setTimeout(step, 350);
    })();
  </script>
</body>
</html>
