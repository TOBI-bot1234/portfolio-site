  <noscript>

  </noscript>
  <script>
    (function () {
      var textEl = document.querySelector('[data-intro]');
      var caretEl = document.querySelector('.intro-caret');
      var ctaEl = document.querySelector('[data-intro-cta]');
      if (!textEl || !ctaEl) return;

      var ctaText = ctaEl.textContent;
      var messages = [
        'Hey!',
        'Pssss!',
        'My Name is Tobi',
        ctaText
      ];

      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) {
        textEl.textContent = '';
        if (caretEl) caretEl.remove();
        ctaEl.hidden = false;
        return;
      }

      var typeMs = 55;
      var eraseMs = 30;
      var holdMs = 900;
      var penultimateHoldMs = 1400;
      var ctaHoldMs = 250;

      var msgIdx = 0;
      var charIdx = 0;
      var typing = true;

      function revealCta() {
        textEl.textContent = '';
        if (caretEl) caretEl.remove();
        ctaEl.hidden = false;
      }

      function step() {
        var current = messages[msgIdx];
        var isLast = msgIdx === messages.length - 1;
        var isPenultimate = msgIdx === messages.length - 2;
        if (typing) {
          charIdx++;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx >= current.length) {
            if (isLast) {
              setTimeout(revealCta, ctaHoldMs);
              return;
            }
            typing = false;
            setTimeout(step, isPenultimate ? penultimateHoldMs : holdMs);
            return;
          }
          setTimeout(step, typeMs);
        } else {
          charIdx--;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx <= 0) {
            typing = true;
            msgIdx++;
            setTimeout(step, typeMs);
            return;
          }
          setTimeout(step, eraseMs);
        }
      }

      setTimeout(step, 350);
    })();
  </script>
