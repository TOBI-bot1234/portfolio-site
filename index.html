<head>
  <meta charset="UTF-8" />

  <meta name="color-scheme" content="light" />

  <link rel="canonical" href="https://tobi-bot1234.github.io/portfolio-site/" />
  <meta name="description" content="Owen Kelley — personal site." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Owen Kelley" />
  <meta property="og:description" content="Owen Kelley — personal site." />
  <meta property="og:url" content="https://tobi-bot1234.github.io/portfolio-site/" />
  <meta property="og:site_name" content="Owen Kelley" />
  <meta name="twitter:card" content="summary" />

</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="nav">
    <div class="brand">
      <a href="index.html" class="wordmark" aria-label="Owen Kelley, home">OWEN KELLEY</a>
      <p class="intro" aria-live="polite">
        <span class="intro-text" data-intro></span><span class="intro-caret" aria-hidden="true"></span>
        <a class="intro-cta" href="#" data-intro-cta hidden>talk to Tobi</a>
      </p>
    </div>
    <nav class="nav-links" aria-label="Primary">
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="hero" id="main">
    <h1 class="hero-text">
      Building thoughtful software,<br />
      one detail at a time.
    </h1>
    <div class="hero-actions" role="group" aria-label="Primary actions">
      <a class="btn" href="work.html">View work</a>
      <a class="btn" href="contact.html">Get in touch</a>
    </div>
  </main>

  <script>
    (function () {
      var textEl = document.querySelector('[data-intro]');
      var caretEl = document.querySelector('.intro-caret');
      var ctaEl = document.querySelector('[data-intro-cta]');
      if (!textEl || !ctaEl) return;

      var ctaText = ctaEl.textContent;
      var messages = [
        'Hey!',
        'Pssss!',
        'My Name is Tobi',
        ctaText
      ];

      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) {
        textEl.textContent = '';
        if (caretEl) caretEl.remove();
        ctaEl.hidden = false;
        return;
      }

      var typeMs = 55;
      var eraseMs = 30;
      var holdMs = 900;
      var penultimateHoldMs = 1400;
      var ctaHoldMs = 250;

      var msgIdx = 0;
      var charIdx = 0;
      var typing = true;

      function revealCta() {
        textEl.textContent = '';
        if (caretEl) caretEl.remove();
        ctaEl.hidden = false;
      }

      function step() {
        var current = messages[msgIdx];
        var isLast = msgIdx === messages.length - 1;
        var isPenultimate = msgIdx === messages.length - 2;
        if (typing) {
          charIdx++;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx >= current.length) {
            if (isLast) {
              setTimeout(revealCta, ctaHoldMs);
              return;
            }
            typing = false;
            setTimeout(step, isPenultimate ? penultimateHoldMs : holdMs);
            return;
          }
          setTimeout(step, typeMs);
        } else {
          charIdx--;
          textEl.textContent = current.slice(0, charIdx);
          if (charIdx <= 0) {
            typing = true;
            msgIdx++;
            setTimeout(step, typeMs);
            return;
          }
          setTimeout(step, eraseMs);
        }
      }

      setTimeout(step, 350);
    })();
  </script>
  <script defer src="assets/sparkle.js"></script>
</body>
</html>
